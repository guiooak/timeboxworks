# Supply-chain hardening: keep install/postinstall scripts disabled by
# default (Yarn 4's default) so a compromised dependency can't run code at
# install time. The few packages that genuinely need to build are
# allow-listed via dependenciesMeta.<pkg>.built in package.json.
enableScripts: false

nodeLinker: node-modules

# Supply-chain mitigation: refuse npm versions published less than 3 days
# ago during add/upgrade. Stronger than Yarn 4's 24h default. Immutable
# installs of already-locked versions are unaffected.
npmMinimalAgeGate: "3d"

yarnPath: .yarn/releases/yarn-4.15.0.cjs
